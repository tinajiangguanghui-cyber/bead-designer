<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>串珠妙计 - 在线手串设计</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; color: #333; background: #f8f6f2; overflow: hidden; user-select: none; }
button { border: none; cursor: pointer; font-family: inherit; font-size: inherit; }
input { font-family: inherit; font-size: inherit; outline: none; }

.page { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
.page.active { display: flex; }

/* Home */
#page-home { background: linear-gradient(180deg, #fdf6f0 0%, #f0e6da 100%); align-items: center; justify-content: center; }
.home-header { position: absolute; top: 60px; }
.logo { font-size: 28px; font-weight: 700; color: #8b5e3c; letter-spacing: 2px; }
.home-hero { width: 280px; height: 280px; margin-bottom: 40px; border-radius: 50%; background: radial-gradient(circle, #fff 30%, #f0e6da 100%); box-shadow: 0 8px 32px rgba(139,94,60,0.2); display: flex; align-items: center; justify-content: center; font-size: 88px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.home-actions { display: flex; flex-direction: column; gap: 16px; width: 280px; }

.btn-primary { background: linear-gradient(135deg, #c9956b, #8b5e3c); color: #fff; padding: 16px 40px; border-radius: 30px; font-size: 18px; font-weight: 600; box-shadow: 0 4px 16px rgba(139,94,60,0.3); transition: transform 0.15s; }
.btn-primary:active { transform: scale(0.96); }
.btn-secondary { background: rgba(255,255,255,0.8); color: #8b5e3c; padding: 14px 32px; border-radius: 30px; font-size: 16px; border: 1.5px solid #d4b896; }
.btn-large { padding: 18px 48px; font-size: 20px; }
.btn-block { width: 100%; }
.btn-danger { background: #e74c3c; color: #fff; padding: 12px 24px; border-radius: 8px; width: 100%; margin-top: 12px; }
.btn-icon { width: 44px; height: 44px; border-radius: 22px; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.btn-icon:disabled { opacity: 0.35; }
.btn-close { background: none; font-size: 28px; color: #999; padding: 4px 8px; }

/* Modal */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
.modal-content { position: relative; background: #fff; border-radius: 20px; padding: 28px; width: 92%; max-width: 520px; max-height: 85vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.2); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-header h3 { font-size: 20px; }

/* Template Grid */
.template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.template-item { padding: 24px 16px; border-radius: 14px; background: #faf6f0; text-align: center; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
.template-item:active { transform: scale(0.95); background: #f0e6da; }
.template-item .template-icon { font-size: 44px; margin-bottom: 10px; }
.template-item .template-name { font-size: 16px; font-weight: 600; color: #5a3e28; }
.template-item .template-desc { font-size: 12px; color: #999; margin-top: 4px; }

/* Designer */
#page-designer { background: #1a1a2e; }
.designer-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(26,26,46,0.95); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; flex-shrink: 0; }
.current-template { flex: 1; color: #ccc; font-size: 15px; text-align: center; }
.designer-canvas { flex: 1; background: #252540; display: flex; align-items: center; justify-content: center; color: #666; font-size: 48px; min-height: 300px; }
.designer-info { display: flex; justify-content: space-between; padding: 6px 16px; background: rgba(26,26,46,0.9); color: #aaa; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
.designer-info strong { color: #f0c78e; }

/* Bead Panel */
.bead-panel { height: 180px; background: rgba(26,26,46,0.95); border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; display: flex; flex-direction: column; }
.bead-filters { display: flex; gap: 8px; padding: 10px 14px; overflow-x: auto; flex-shrink: 0; }
.filter-btn { padding: 6px 18px; border-radius: 18px; font-size: 13px; background: rgba(255,255,255,0.1); color: #aaa; white-space: nowrap; }
.filter-btn.active { background: #c9956b; color: #fff; }
.bead-list { flex: 1; display: flex; gap: 12px; padding: 10px 14px; overflow-x: auto; align-items: center; }
.bead-item { flex-shrink: 0; width: 72px; height: 92px; border-radius: 14px; background: rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
.bead-item:active { transform: scale(0.92); }
.bead-item .bead-thumb { width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.bead-item .bead-label { font-size: 11px; color: #999; text-align: center; line-height: 1.2; max-width: 66px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Export */
.export-options { display: flex; gap: 12px; margin-bottom: 16px; }
.export-option { flex: 1; text-align: center; cursor: pointer; padding: 12px; border-radius: 12px; border: 2px solid #eee; }
.export-option.active { border-color: #c9956b; background: #fdf6f0; }
.export-preview { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 8px; }
.export-preview-transparent { background: repeating-conic-gradient(#eee 0% 25%, transparent 0% 50%) 50% / 12px 12px; }
.export-preview-white { background: #fff; border: 1px solid #eee; }
.export-preview-gradient { background: linear-gradient(135deg, #fdf6f0, #e8d5c4); }
.export-option span { font-size: 12px; color: #666; }

/* Save */
.save-form { display: flex; flex-direction: column; gap: 12px; }
.save-form input { padding: 12px 16px; border-radius: 10px; border: 1.5px solid #ddd; font-size: 15px; width: 100%; }
.save-form input:focus { border-color: #c9956b; }

/* Edit */
.edit-form { display: flex; flex-direction: column; gap: 14px; }
.edit-row label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
.size-options, .color-options { display: flex; gap: 8px; flex-wrap: wrap; }
.size-opt, .color-opt { padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1.5px solid #ddd; background: #fff; }
.size-opt.active, .color-opt.active { border-color: #c9956b; background: #fdf6f0; color: #8b5e3c; font-weight: 600; }
.color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.1); }

/* Works */
#page-works { background: #f8f6f2; }
.page-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #eee; }
.works-grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 20px; overflow-y: auto; align-content: start; }
.work-card { background: #fff; border-radius: 14px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
.work-card .work-thumb { width: 100%; aspect-ratio: 1; background: #f5f0ea; display: flex; align-items: center; justify-content: center; font-size: 56px; }
.work-card .work-info { padding: 14px 14px 8px; }
.work-card .work-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.work-card .work-meta { font-size: 12px; color: #999; display: flex; justify-content: space-between; }
.work-card .work-actions { display: flex; gap: 6px; padding: 6px 14px 14px; }
.work-card .work-actions button { font-size: 12px; padding: 5px 14px; border-radius: 14px; background: #f5f5f5; color: #666; }
.work-card .work-actions .btn-del { color: #e74c3c; }
.works-empty { grid-column: 1 / -1; text-align: center; padding: 60px 20px; }
.works-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
.works-empty p { color: #999; margin-bottom: 16px; }

.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 13px; z-index: 200; opacity: 0; transition: all 0.3s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="page-home" class="page active">
  <div class="home-header"><div class="logo">📿 串珠妙计</div></div>
  <div class="home-hero">📿</div>
  <div class="home-actions">
    <button class="btn-primary btn-large" id="btn-start-design">开始设计</button>
    <button class="btn-secondary" id="btn-my-works">我的作品 <span id="works-count">0</span></button>
  </div>
</div>

<div id="modal-template" class="modal">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3>选择饰品类型</h3><button class="btn-close" id="btn-close-template">&times;</button></div>
    <div class="template-grid" id="template-grid"></div>
  </div>
</div>

<div id="page-designer" class="page">
  <div class="designer-toolbar">
    <button class="btn-icon" id="btn-back">←</button>
    <span class="current-template" id="current-template-name">手串·单圈</span>
    <button class="btn-icon" id="btn-undo" disabled>↩</button>
    <button class="btn-icon" id="btn-redo" disabled>↪</button>
    <button class="btn-icon" id="btn-save">💾</button>
    <button class="btn-icon" id="btn-export">📷</button>
  </div>
  <div class="designer-canvas" id="designer-canvas">
    <canvas id="preview-canvas" style="width:100%;height:100%;"></canvas>
  </div>
  <div class="designer-info">
    <span>共 <strong id="bead-count">0</strong> 颗珠子</span>
    <span>总长约 <strong id="total-length">0</strong>mm</span>
  </div>
  <div class="bead-panel">
    <div class="bead-filters" id="bead-filters"></div>
    <div class="bead-list" id="bead-list"></div>
  </div>
</div>

<div id="modal-bead-edit" class="modal">
  <div class="modal-overlay"></div>
  <div class="modal-content" style="border-radius:16px 16px 0 0; position:fixed; bottom:0; left:0; right:0; max-width:100%;">
    <div class="modal-header"><h3 id="edit-bead-name">珠子编辑</h3><button class="btn-close" id="btn-close-edit">&times;</button></div>
    <div class="edit-form">
      <div class="edit-row"><label>尺寸</label><div class="size-options" id="edit-sizes"></div></div>
      <div class="edit-row"><label>颜色</label><div class="color-options" id="edit-colors"></div></div>
      <button class="btn-danger" id="btn-delete-bead">删除这颗珠子</button>
    </div>
  </div>
</div>

<div id="modal-export" class="modal">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3>导出效果图</h3><button class="btn-close" id="btn-close-export">&times;</button></div>
    <div class="export-options">
      <div class="export-option active" data-bg="transparent"><div class="export-preview export-preview-transparent"></div><span>透明背景 PNG</span></div>
      <div class="export-option" data-bg="white"><div class="export-preview export-preview-white"></div><span>白色背景 JPG</span></div>
      <div class="export-option" data-bg="gradient"><div class="export-preview export-preview-gradient"></div><span>渐变背景 JPG</span></div>
    </div>
    <button class="btn-primary btn-block" id="btn-confirm-export">确认导出</button>
  </div>
</div>

<div id="page-works" class="page">
  <div class="page-header"><button class="btn-icon" id="btn-works-back">←</button><h3>我的作品</h3></div>
  <div class="works-grid" id="works-grid">
    <div class="works-empty"><div class="empty-icon">📿</div><p>还没有作品</p><button class="btn-primary" id="btn-works-create">去设计第一个吧</button></div>
  </div>
</div>

<div id="modal-save" class="modal">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header"><h3>保存作品</h3><button class="btn-close" id="btn-close-save">&times;</button></div>
    <div class="save-form"><input type="text" id="input-work-name" placeholder="输入作品名称" maxlength="30"><button class="btn-primary btn-block" id="btn-confirm-save">保存</button></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ========== 数据定义 ==========
const TEMPLATES = [
  { id:'bracelet_single', name:'手串·单圈', icon:'💫', category:'手串', desc:'单圈手串' },
  { id:'bracelet_double', name:'手串·双圈', icon:'💫', category:'手串', desc:'双圈手串' },
  { id:'bracelet_triple', name:'手串·三圈', icon:'💫', category:'手串', desc:'三圈手串' },
  { id:'necklace_short', name:'项链·短链', icon:'✨', category:'项链', desc:'短款项链' },
  { id:'necklace_long', name:'项链·长链', icon:'✨', category:'项链', desc:'长款项链' },
  { id:'earring', name:'耳环', icon:'💎', category:'耳环', desc:'垂坠耳环' },
  { id:'phone_chain', name:'手机链', icon:'📱', category:'手机链', desc:'手机挂链' }
];

const BEAD_COLORS = {
  red:{hex:'#c0392b',name:'红'}, orange:{hex:'#e67e22',name:'橙'}, yellow:{hex:'#f1c40f',name:'黄'},
  green:{hex:'#27ae60',name:'绿'}, blue:{hex:'#2980b9',name:'蓝'}, purple:{hex:'#8e44ad',name:'紫'},
  white:{hex:'#ecf0f1',name:'白'}, black:{hex:'#2c3e50',name:'黑'}, pink:{hex:'#e8a0bf',name:'粉'},
  brown:{hex:'#8b5e3c',name:'棕'}, teal:{hex:'#1abc9c',name:'青'},
  gold:{hex:'#f0c040',name:'金'}, silver:{hex:'#c0c0c0',name:'银'}, rosegold:{hex:'#e8b4b8',name:'玫瑰金'}
};

// 珠子数据库
var BEAD_LIBRARY = [];
(function buildLib(){
  var id=0;
  [{c:'pink',n:'粉晶圆珠',m:'crystal',s:'round'},{c:'purple',n:'紫晶圆珠',m:'crystal',s:'round'},{c:'white',n:'白晶圆珠',m:'crystal',s:'round'},{c:'yellow',n:'黄晶圆珠',m:'crystal',s:'round'},{c:'brown',n:'茶晶圆珠',m:'crystal',s:'round'},{c:'blue',n:'蓝晶圆珠',m:'crystal',s:'round'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[6,8,10,12],defaultSize:8});});
  [{c:'pink',n:'粉晶桶珠',m:'crystal',s:'barrel'},{c:'purple',n:'紫晶桶珠',m:'crystal',s:'barrel'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[8,10,12],defaultSize:10});});
  [{c:'green',n:'翡翠圆珠',m:'jade',s:'round'},{c:'white',n:'和田圆珠',m:'jade',s:'round'},{c:'red',n:'玛瑙圆珠',m:'jade',s:'round'},{c:'blue',n:'青金石圆珠',m:'jade',s:'round'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[6,8,10,12],defaultSize:8});});
  [{c:'green',n:'翡翠桶珠',m:'jade',s:'barrel'},{c:'red',n:'玛瑙桶珠',m:'jade',s:'barrel'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[8,10,12],defaultSize:10});});
  BEAD_LIBRARY.push({id:id++,name:'翡翠算盘珠',material:'jade',shape:'abacus',color:'green',sizes:[8,10],defaultSize:8});
  BEAD_LIBRARY.push({id:id++,name:'貔貅雕刻',material:'jade',shape:'carving',color:'green',sizes:[10,12,14],defaultSize:12});
  BEAD_LIBRARY.push({id:id++,name:'平安扣雕刻',material:'jade',shape:'carving',color:'white',sizes:[10,12,14],defaultSize:12});
  [{c:'brown',n:'檀木圆珠',m:'wood',s:'round'},{c:'black',n:'菩提圆珠',m:'wood',s:'round'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[8,10,12],defaultSize:10});});
  BEAD_LIBRARY.push({id:id++,name:'檀木桶珠',material:'wood',shape:'barrel',color:'brown',sizes:[10,12],defaultSize:10});
  BEAD_LIBRARY.push({id:id++,name:'莲花雕刻',material:'wood',shape:'carving',color:'brown',sizes:[10,12,14],defaultSize:12});
  [{c:'silver',n:'银圆珠',m:'metal',s:'round'},{c:'gold',n:'金圆珠',m:'metal',s:'round'},{c:'rosegold',n:'玫瑰金圆珠',m:'metal',s:'round'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[4,6,8,10],defaultSize:6});});
  [{c:'silver',n:'银隔片',m:'metal',s:'spacer'},{c:'gold',n:'金隔片',m:'metal',s:'spacer'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[4,6],defaultSize:4});});
  [{c:'white',n:'白瓷圆珠',m:'ceramic',s:'round'},{c:'blue',n:'青花圆珠',m:'ceramic',s:'round'},{c:'teal',n:'彩釉圆珠',m:'ceramic',s:'round'}].forEach(function(x){BEAD_LIBRARY.push({id:id++,name:x.n,material:x.m,shape:x.s,color:x.c,sizes:[8,10,12],defaultSize:10});});
  BEAD_LIBRARY.push({id:id++,name:'青花桶珠',material:'ceramic',shape:'barrel',color:'blue',sizes:[10,12],defaultSize:10});
  BEAD_LIBRARY.push({id:id++,name:'青花算盘珠',material:'ceramic',shape:'abacus',color:'blue',sizes:[8,10],defaultSize:8});
})();

// ========== 作品管理 ==========
var STORAGE_KEY = 'bead_designer_works';
function loadWorks(){ try{ var d=localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):[]; }catch(e){ return[]; } }
function saveWorks(works){ localStorage.setItem(STORAGE_KEY, JSON.stringify(works)); }
function addWork(name, data){ var w={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name||'设计_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,''),designData:data,createdAt:new Date().toISOString(),beadCount:data.beads?data.beads.length:0}; var works=loadWorks(); works.unshift(w); saveWorks(works); return w; }
function updateWork(id, data){ var works=loadWorks(); var w=works.find(function(x){return x.id===id;}); if(!w) return null; w.designData=data; w.beadCount=data.beads?data.beads.length:0; w.updatedAt=new Date().toISOString(); saveWorks(works); return w; }
function deleteWork(id){ var works=loadWorks(); works=works.filter(function(x){return x.id!==id;}); saveWorks(works); }
function getWork(id){ return loadWorks().find(function(x){return x.id===id;}); }
function getWorksCount(){ return loadWorks().length; }

// ========== App ==========
var app = {
  currentTemplateId: 'bracelet_single',
  currentWorkId: null,
  beads: [],
  activeFilter: 'all',
  exportBg: 'transparent',
  undoStack: [],
  redoStack: [],

  init: function(){
    this.bindEvents();
    this.updateWorksCount();
    console.log('串珠妙计 2D 版本已启动 ✓');
  },

  bindEvents: function(){
    var self = this;
    document.getElementById('btn-start-design').onclick = function(){ self.showModal('modal-template'); self.renderTemplateGrid(); };
    document.getElementById('btn-my-works').onclick = function(){ self.showPage('page-works'); self.renderWorksList(); };
    document.getElementById('btn-close-template').onclick = function(){ self.hideModal('modal-template'); };
    document.getElementById('btn-back').onclick = function(){ self.showPage('page-home'); };
    document.getElementById('btn-undo').onclick = function(){ self.undo(); };
    document.getElementById('btn-redo').onclick = function(){ self.redo(); };
    document.getElementById('btn-save').onclick = function(){ self.openSaveDialog(); };
    document.getElementById('btn-export').onclick = function(){ if(self.beads.length===0){self.showToast('请先添加珠子');return;} self.showModal('modal-export'); };
    document.getElementById('btn-close-export').onclick = function(){ self.hideModal('modal-export'); };
    document.getElementById('btn-confirm-export').onclick = function(){ self.doExport(); };
    document.getElementById('btn-close-save').onclick = function(){ self.hideModal('modal-save'); };
    document.getElementById('btn-confirm-save').onclick = function(){ self.doSave(); };
    document.getElementById('btn-close-edit').onclick = function(){ self.hideModal('modal-bead-edit'); };
    document.getElementById('btn-delete-bead').onclick = function(){ self.deleteSelectedBead(); };
    document.getElementById('btn-works-back').onclick = function(){ self.showPage('page-home'); };

    document.querySelectorAll('.export-option').forEach(function(opt){
      opt.onclick = function(){
        document.querySelectorAll('.export-option').forEach(function(o){o.classList.remove('active');});
        opt.classList.add('active');
        self.exportBg = opt.dataset.bg;
      };
    });

    this.renderBeadFilters();
  },

  // ===== 模板 =====
  renderTemplateGrid: function(){
    var grid = document.getElementById('template-grid');
    grid.innerHTML = '';
    TEMPLATES.forEach(function(tpl){
      var item = document.createElement('div');
      item.className = 'template-item';
      item.innerHTML = '<div class="template-icon">'+tpl.icon+'</div><div class="template-name">'+tpl.name+'</div><div class="template-desc">'+tpl.desc+'</div>';
      item.onclick = function(){ app.hideModal('modal-template'); app.startDesign(tpl.id); };
      grid.appendChild(item);
    });
  },

  startDesign: function(templateId){
    this.currentTemplateId = templateId;
    this.currentWorkId = null;
    this.beads = [];
    this.undoStack = [];
    this.redoStack = [];
    var tpl = TEMPLATES.find(function(t){return t.id===templateId;});
    document.getElementById('current-template-name').textContent = tpl?tpl.name:'手串·单圈';
    this.showPage('page-designer');
    this.renderBeadList();
    this.updateInfo();
    this.updateUndoRedo();
    this.drawPreview();
  },

  // ===== 珠子列表 =====
  renderBeadFilters: function(){
    var self = this;
    var container = document.getElementById('bead-filters');
    var cats = [{key:'all',label:'全部'},{key:'crystal',label:'水晶'},{key:'jade',label:'玉石'},{key:'wood',label:'木质'},{key:'metal',label:'金属'},{key:'ceramic',label:'陶瓷'}];
    container.innerHTML = '';
    cats.forEach(function(cat){
      var btn = document.createElement('button');
      btn.className = 'filter-btn'+(cat.key===self.activeFilter?' active':'');
      btn.textContent = cat.label;
      btn.onclick = function(){ self.activeFilter=cat.key; self.renderBeadFilters(); self.renderBeadList(); };
      container.appendChild(btn);
    });
  },

  renderBeadList: function(){
    var self = this;
    var container = document.getElementById('bead-list');
    container.innerHTML = '';
    var beads = this.activeFilter==='all' ? BEAD_LIBRARY : BEAD_LIBRARY.filter(function(b){return b.material===self.activeFilter;});
    beads.forEach(function(bead){
      var item = document.createElement('div');
      item.className = 'bead-item';
      var hex = (BEAD_COLORS[bead.color]||{}).hex || '#ccc';
      var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      var light = 'rgb('+Math.min(255,r+80)+','+Math.min(255,g+80)+','+Math.min(255,b+80)+')';
      item.innerHTML = '<div class="bead-thumb" style="background:radial-gradient(circle at 35% 35%, '+light+', '+hex+')"></div><div class="bead-label">'+bead.name+'</div>';
      item.onclick = function(){ self.addBead(bead); };
      container.appendChild(item);
    });
  },

  addBead: function(beadDef){
    this.undoStack.push({type:'add',bead:{beadDef:beadDef,size:beadDef.defaultSize,color:beadDef.color}});
    this.redoStack = [];
    this.beads.push({beadDef:beadDef,size:beadDef.defaultSize,color:beadDef.color});
    this.updateInfo();
    this.updateUndoRedo();
    this.drawPreview();
    this.showToast('已添加: '+beadDef.name);
  },

  deleteSelectedBead: function(){
    var idx = this.selectedBeadIndex;
    if(idx===undefined||idx<0||idx>=this.beads.length) return;
    var removed = this.beads[idx];
    this.undoStack.push({type:'remove',bead:removed,index:idx});
    this.redoStack = [];
    this.beads.splice(idx,1);
    this.selectedBeadIndex = -1;
    this.hideModal('modal-bead-edit');
    this.updateInfo();
    this.updateUndoRedo();
    this.drawPreview();
  },

  openBeadEdit: function(index){
    var bead = this.beads[index];
    if(!bead) return;
    this.selectedBeadIndex = index;
    document.getElementById('edit-bead-name').textContent = bead.beadDef.name;

    var sizesContainer = document.getElementById('edit-sizes');
    sizesContainer.innerHTML = '';
    bead.beadDef.sizes.forEach(function(s){
      var btn = document.createElement('button');
      btn.className = 'size-opt'+(bead.size===s?' active':'');
      btn.textContent = s+'mm';
      btn.onclick = function(){ bead.size=s; app.updateInfo(); app.showModal('modal-bead-edit'); app.openBeadEdit(index); };
      sizesContainer.appendChild(btn);
    });

    var colorsContainer = document.getElementById('edit-colors');
    colorsContainer.innerHTML = '';
    var colorKeys = {crystal:['pink','purple','white','yellow','brown','blue'],jade:['green','white','red','blue'],wood:['brown','black'],metal:['silver','gold','rosegold'],ceramic:['white','blue','teal']};
    var keys = colorKeys[bead.beadDef.material] || Object.keys(BEAD_COLORS).slice(0,8);
    keys.forEach(function(k){
      var c = BEAD_COLORS[k];
      var btn = document.createElement('button');
      btn.className = 'color-opt'+(bead.color===k?' active':'');
      btn.innerHTML = '<span class="color-dot" style="background:'+c.hex+'"></span>'+c.name;
      btn.onclick = function(){ bead.color=k; app.updateInfo(); app.showModal('modal-bead-edit'); app.openBeadEdit(index); };
      colorsContainer.appendChild(btn);
    });

    this.showModal('modal-bead-edit');
  },

  // ===== 2D Canvas 预览 =====
  drawPreview: function(){
    var canvas = document.getElementById('preview-canvas');
    if(!canvas) return;
    var container = document.getElementById('designer-canvas');
    var w = container.clientWidth;
    var h = container.clientHeight;
    if(w===0||h===0){ setTimeout(function(){app.drawPreview();},100); return; }
    var dpr = window.devicePixelRatio||1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w+'px';
    canvas.style.height = h+'px';
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);

    // 背景
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0,0,w,h);

    var beads = this.beads;
    if(beads.length===0){
      ctx.fillStyle = '#666';
      ctx.font = '48px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('📿', w/2, h/2-10);
      ctx.font = '16px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.fillStyle = '#777';
      ctx.fillText('点击下方珠子开始设计', w/2, h/2+40);
      return;
    }

    // 串绳线
    var tpl = TEMPLATES.find(function(t){return t.id===app.currentTemplateId;});
    var ropeType = tpl ? (tpl.ropeType || 'circle') : 'circle';
    ctx.strokeStyle = '#8b7355';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();

    if(ropeType==='circle'){
      var cx=w/2, cy=h/2, r=Math.min(w,h)*0.35;
      ctx.arc(cx, cy, r, 0, Math.PI*2);
    } else if(ropeType==='uShape'){
      ctx.moveTo(w/2-100, h*0.15);
      ctx.quadraticCurveTo(w/2-50, h*0.6, w/2, h*0.6);
      ctx.quadraticCurveTo(w/2+50, h*0.6, w/2+100, h*0.15);
    } else {
      ctx.moveTo(w/2, h*0.08);
      ctx.lineTo(w/2, h*0.92);
    }
    ctx.stroke();

    // 计算珠子在串绳上的位置
    var positions = [];
    var N = beads.length;
    if(ropeType==='circle'){
      var r2 = Math.min(w,h)*0.35;
      for(var i=0;i<N;i++){
        var angle = N>1 ? (i/N)*Math.PI*2 - Math.PI/2 : -Math.PI/2;
        positions.push({x:w/2+Math.cos(angle)*r2, y:h/2+Math.sin(angle)*r2});
      }
    } else if(ropeType==='uShape'){
      for(var i=0;i<N;i++){
        var t2 = N>1 ? i/(N-1) : 0.5;
        var x2 = w/2-100 + t2*200;
        var y2 = h*0.6 - Math.sin(t2*Math.PI)*h*0.45;
        positions.push({x:x2, y:y2});
      }
    } else {
      for(var i=0;i<N;i++){
        var t3 = N>1 ? i/(N-1) : 0.5;
        positions.push({x:w/2, y:h*0.08 + t3*h*0.84});
      }
    }

    // 珠子大小自适应
    var beadSize = Math.min(26, Math.max(10, (Math.min(w,h)*0.4)/N));

    // 绘制珠子
    for(var i=0;i<N;i++){
      var bead = beads[i];
      var pos = positions[i];
      var colorHex = (BEAD_COLORS[bead.color]||{}).hex || '#ccc';
      var s = beadSize;

      // 根据形状绘制
      ctx.save();
      if(bead.beadDef.shape==='round'){
        var grad = ctx.createRadialGradient(pos.x-s*0.3, pos.y-s*0.3, s*0.05, pos.x, pos.y, s);
        grad.addColorStop(0, this.lightenHex(colorHex, 80));
        grad.addColorStop(0.6, colorHex);
        grad.addColorStop(1, this.darkenHex(colorHex, 60));
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, s, 0, Math.PI*2);
        ctx.fill();
      } else if(bead.beadDef.shape==='barrel'){
        ctx.fillStyle = colorHex;
        this.roundRectFn(ctx, pos.x-s*0.55, pos.y-s, s*1.1, s*2, s*0.3);
        ctx.fill();
      } else if(bead.beadDef.shape==='abacus'){
        ctx.fillStyle = colorHex;
        ctx.beginPath();
        ctx.ellipse(pos.x, pos.y, s*0.9, s*0.5, 0, 0, Math.PI*2);
        ctx.fill();
      } else if(bead.beadDef.shape==='spacer'){
        ctx.fillStyle = colorHex;
        this.roundRectFn(ctx, pos.x-s*0.8, pos.y-s*0.25, s*1.6, s*0.5, s*0.2);
        ctx.fill();
      } else if(bead.beadDef.shape==='carving'){
        ctx.fillStyle = colorHex;
        this.roundRectFn(ctx, pos.x-s*0.6, pos.y-s*0.7, s*1.2, s*1.4, s*0.3);
        ctx.fill();
      } else {
        ctx.fillStyle = colorHex;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, s, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();

      // 珠孔
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, s*0.18, 0, Math.PI*2);
      ctx.fill();

      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(pos.x-s*0.22, pos.y-s*0.22, s*0.22, 0, Math.PI*2);
      ctx.fill();
    }

    // 选中高亮
    if(this.selectedBeadIndex>=0 && this.selectedBeadIndex<positions.length){
      var sp = positions[this.selectedBeadIndex];
      ctx.strokeStyle = '#f0c78e';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, beadSize+5, 0, Math.PI*2);
      ctx.stroke();
    }
  },

  roundRectFn: function(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r);
    ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h);
    ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r);
    ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  },

  lightenHex: function(hex, amt){
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(function(v){var s=v.toString(16);return s.length===1?'0'+s:s;}).join('');
  },

  darkenHex: function(hex, amt){
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,r-amt); g=Math.max(0,g-amt); b=Math.max(0,b-amt);
    return '#'+[r,g,b].map(function(v){var s=v.toString(16);return s.length===1?'0'+s:s;}).join('');
  },

  undo: function(){
    if(this.undoStack.length===0) return;
    var action = this.undoStack.pop();
    this.redoStack.push(action);
    if(action.type==='add') this.beads.pop();
    else if(action.type==='remove') this.beads.splice(action.index,0,action.bead);
    this.updateInfo();
    this.updateUndoRedo();
    this.drawPreview();
  },

  redo: function(){
    if(this.redoStack.length===0) return;
    var action = this.redoStack.pop();
    this.undoStack.push(action);
    if(action.type==='add') this.beads.push(action.bead);
    else if(action.type==='remove') this.beads.splice(action.index,1);
    this.updateInfo();
    this.updateUndoRedo();
    this.drawPreview();
  },

  updateInfo: function(){
    document.getElementById('bead-count').textContent = this.beads.length;
    var total = 0;
    this.beads.forEach(function(b){total+=b.size;});
    total += this.beads.length * 0.5;
    document.getElementById('total-length').textContent = Math.round(total);
  },

  updateUndoRedo: function(){
    document.getElementById('btn-undo').disabled = this.undoStack.length===0;
    document.getElementById('btn-redo').disabled = this.redoStack.length===0;
  },

  updateWorksCount: function(){
    document.getElementById('works-count').textContent = getWorksCount();
  },

  // ===== 保存 =====
  openSaveDialog: function(){
    if(this.beads.length===0){ this.showToast('请先添加珠子'); return; }
    var w = this.currentWorkId?getWork(this.currentWorkId):null;
    document.getElementById('input-work-name').value = w?w.name:'';
    this.showModal('modal-save');
    setTimeout(function(){ document.getElementById('input-work-name').focus(); },300);
  },

  doSave: function(){
    var name = document.getElementById('input-work-name').value.trim() || '设计_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'');
    var data = {templateId:this.currentTemplateId,beads:this.beads.map(function(b){return{beadId:b.beadDef.id,size:b.size,color:b.color};})};
    if(this.currentWorkId){ updateWork(this.currentWorkId, data); }
    else { var w = addWork(name, data); this.currentWorkId = w.id; }
    this.hideModal('modal-save');
    this.showToast('保存成功！');
    this.updateWorksCount();
  },

  // ===== 导出(2D简化版) =====
  doExport: function(){
    this.hideModal('modal-export');
    this.showToast('导出功能将在3D版本中启用');
  },

  // ===== 作品列表 =====
  renderWorksList: function(){
    var container = document.getElementById('works-grid');
    var works = loadWorks();
    if(works.length===0){
      container.innerHTML = '<div class="works-empty"><div class="empty-icon">📿</div><p>还没有作品</p><button class="btn-primary" id="btn-works-create">去设计第一个吧</button></div>';
      document.getElementById('btn-works-create').onclick = function(){ app.showModal('modal-template'); app.renderTemplateGrid(); };
      return;
    }
    container.innerHTML = '';
    works.forEach(function(work){
      var card = document.createElement('div');
      card.className = 'work-card';
      card.innerHTML = '<div class="work-thumb">📿</div><div class="work-info"><div class="work-name">'+work.name+'</div><div class="work-meta"><span>'+work.beadCount+'颗</span><span>'+new Date(work.createdAt).toLocaleDateString('zh-CN')+'</span></div></div><div class="work-actions"><button class="btn-edit" data-id="'+work.id+'">编辑</button><button class="btn-del" data-id="'+work.id+'">删除</button></div>';
      card.querySelector('.work-thumb').onclick = function(){ app.openWork(work.id); };
      card.querySelector('.btn-edit').onclick = function(e){ e.stopPropagation(); app.openWork(work.id); };
      card.querySelector('.btn-del').onclick = function(e){ e.stopPropagation(); if(confirm('确定要删除「'+work.name+'」吗？')){ deleteWork(work.id); app.renderWorksList(); app.updateWorksCount(); app.showToast('已删除'); }};
      container.appendChild(card);
    });
  },

  openWork: function(workId){
    var work = getWork(workId);
    if(!work) return;
    this.currentWorkId = work.id;
    this.currentTemplateId = work.designData.templateId;
    this.beads = work.designData.beads.map(function(b){var def=BEAD_LIBRARY.find(function(d){return d.id===b.beadId;});return def?{beadDef:def,size:b.size,color:b.color}:null;}).filter(Boolean);
    this.undoStack = [];
    this.redoStack = [];
    var tpl = TEMPLATES.find(function(t){return t.id===work.designData.templateId;});
    document.getElementById('current-template-name').textContent = tpl?tpl.name:'手串·单圈';
    this.showPage('page-designer');
    this.renderBeadList();
    this.updateInfo();
    this.updateUndoRedo();
    this.drawPreview();
  },

  // ===== 页面导航 =====
  showPage: function(pageId){
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
    document.getElementById(pageId).classList.add('active');
  },

  showModal: function(modalId){
    document.getElementById(modalId).classList.add('show');
  },

  hideModal: function(modalId){
    document.getElementById(modalId).classList.remove('show');
  },

  showToast: function(msg){
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(function(){toast.classList.remove('show');},2000);
  }
};

// 启动
document.addEventListener('DOMContentLoaded', function(){
  app.init();
});
</script>
</body>
